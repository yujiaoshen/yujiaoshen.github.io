short_bio: >-
  <p>Hi there! I am Yujiao Shen, an M.Sc. student in Artificial Intelligence (MSAI) at the College of Computing and Data Science (CCDS), Nanyang Technological University (NTU). Alongside my studies, I work as a Research Intern at <a href="https://www.mmlab-ntu.com/" target="_blank">MMLab@NTU</a>, fortunate to be advised by Prof. <a href="https://liuziwei7.github.io/" target="_blank">Ziwei Liu</a> and mentored by Dr. <a href="https://jingkangyang.com/" target="_blank">Jingkang Yang</a>. Before my journey in Singapore, I earned my Bachelor's degree from the School of Software Engineering at Tongji University. Beyond the lab, my curiosity extends to philosophy and psychology, and I keep myself energized through singing and sports. I am always excited to connect with fellow researchers and enthusiasts - feel free to drop me a message to chat or collaborate!</p>

